name: Nightly image

# Rebuilds the Docker image daily and republishes ghcr.io/<repo>:nightly.
#
# The image bakes in `cargo-soteria setup`, which downloads that day's
# soteria-rust bundle from the soteria nightly GitHub release (published at
# 02:00 UTC). We run at 03:00 UTC so the fresh bundle is available.
#
# `:nightly` is a moving tag (repointed every run). Each run also publishes an
# immutable `:YYYY-MM-DD` tag so a regression can be pinned/rolled back to.
#
# Two independent jobs run in parallel every night:
#   - publish: build, smoke test, push :nightly + :YYYY-MM-DD
#   - prune:   delete versions older than 5 days
# They don't depend on each other: `:nightly` and recent dated tags are
# protected from pruning regardless of which job finishes first.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: nightly-image
  cancel-in-progress: false

jobs:
  publish:
    name: Build, smoke test & publish nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load locally, and smoke test before anything is pushed so a
      # broken soteria nightly never gets published as :nightly.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cargo-soteria:nightly-candidate
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests/fixtures/simple-crate:/workspace" \
            cargo-soteria:nightly-candidate

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly
            type=schedule,pattern={{date 'YYYY-MM-DD'}}

      # Re-runs from the gha cache, so this is fast and produces the exact image
      # that passed the smoke test above.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prune:
    name: Prune versions older than 5 days
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with publish. Safe in any order:
    # `:nightly` is protected by skip-tags (so is its provenance child), and
    # today's dated tag is < 5 days old so it never matches the cut-off.
    steps:
      # The provenance attestations attached by the publish job are untagged
      # child manifests of live tags, so a naive prune would corrupt tagged
      # images. snok/container-retention-policy@v3 is manifest-list/referrer
      # aware: it never deletes a child manifest of a kept image, and deletes
      # an image's attestation child together with the image. `skip-tags`
      # keeps :nightly (and its children) regardless of age; `tag-selection:
      # both` also removes dated :YYYY-MM-DD tags once they age out, giving a
      # rolling 5-day rollback window. Untagged orphans are removed too.
      - name: Prune versions older than 5 days
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: cargo-soteria
          cut-off: 7d
          tag-selection: both
          image-tags: "!nightly"
